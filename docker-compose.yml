version: '3.8'

services:
  web:
    build: .
    container_name: vehicle_detection_app
    ports:
      - "5000:5000"
    volumes:
      # Mount database file for persistence
      - ./vehical_detections.db:/app/vehical_detections.db
      # Mount logs directory
      - ./logs:/app/logs
      # Mount static files for uploaded content
      - ./static:/app/static
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=sqlite:///vehical_detections.db
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/test')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - vehicle_network

networks:
  vehicle_network:
    driver: bridge
