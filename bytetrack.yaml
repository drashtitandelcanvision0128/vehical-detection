# ByteTrack Configuration for Vehicle Detection
tracker_type: bytetrack
track_high_thresh: 0.5    # High confidence threshold for first association
track_low_thresh: 0.1     # Low confidence threshold for second association
new_track_thresh: 0.6     # Threshold for new track initialization
track_buffer: 30          # Track buffer length (frames to keep lost tracks)
match_thresh: 0.8         # Matching threshold for track association
fuse_score: true           # Fuse score with IoU for matching
